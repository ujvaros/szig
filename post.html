<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bejegyzés | Széchenyi Hírek</title>
	<link rel="stylesheet" href="/szig/res/styles.css">
</head>
<body>
	<script src="/szig/res/HeaderFooter.js"></script>
	<my-header></my-header>
<div id="news-container" class="post-grid">
<div class="container" id="post-container">
    <div class="loading">⏳ Bejegyzés betöltése...</div>
</div>
</div>

<script>
    // Segédfüggvények (decode, escape)
    function decodeHtmlEntities(str) {
        const textarea = document.createElement('textarea');
        textarea.innerHTML = str;
        return textarea.value;
    }
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function loadPost() {
        const urlParams = new URLSearchParams(window.location.search);
        const postId = urlParams.get('id');

        if (!postId) {
            document.getElementById('post-container').innerHTML = '<div class="error">❌ Érvénytelen vagy hiányzó bejegyzés azonosító.</div>';
            return;
        }

        const container = document.getElementById('post-container');
        container.innerHTML = '<div class="loading">⏳ Bejegyzés betöltése...</div>';

        try {
            // 1. Lekérjük a poszt adatait
            const response = await fetch(`https://szig-dujv.hu/wp-json/wp/v2/posts/${postId}?_embed`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);

            const post = await response.json();

            // 2. Feldolgozzuk a tartalmat
            let title = decodeHtmlEntities(post.title.rendered).trim();
if (title === '') title = '(Cím nélküli bejegyzés)';
            let content = post.content.rendered;
            let date = new Date(post.date);
            let formattedDate = date.toLocaleDateString('hu-HU', { year: 'numeric', month: 'long', day: 'numeric' });

            // 3. Megjelenítjük a modern dizájnban
            container.innerHTML = `
				<a href="/szig" class="back-link">← Vissza a hírekhez</a>
                <div class="post-header">
                    <h1 class="post-title">${escapeHtml(title)}</h1>
                    <span class="post-meta">📅 Közzétéve: ${formattedDate}</span>
                </div>
                <div class="post-content">
                    ${content}
                </div>
            `;

        } catch (error) {
            console.error('Hiba a betöltéskor:', error);
            container.innerHTML = `<div class="error">❌ Hiba történt a bejegyzés betöltésekor: ${error.message}</div>`;
        }
    }

    loadPost();
</script>
<my-footer></my-footer>
</body>
</html>
